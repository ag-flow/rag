services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-rag_config}
    # Exposé sur le LAN pour permettre au dev Windows de lancer les tests contre cette DB.
    # Machine de test uniquement — NON sûr pour de la vraie prod.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    networks: [rag]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-backend:latest
    container_name: rag-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # SHA injecté par dev-deploy.sh au up — pas de rebuild requis quand le commit change.
      GIT_SHA: ${GIT_SHA:-unknown}
    # Exposé sur le LAN pour curl direct sur l'API depuis le Windows dev pendant les tests.
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [rag]
    volumes:
      # M3 : clones git persistants entre runs.
      # `dev-deploy.sh --reset` (down -v) purge ce volume au passage.
      - rag_repos:/var/lib/rag/repos
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rag-frontend:latest
    container_name: rag-frontend
    restart: unless-stopped
    networks: [rag]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 10s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: rag-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, frontend]
    networks: [rag]

  # http://<host>:8081/  — exposé sur l'IP de l'hôte Docker
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: rag-pgweb
    restart: unless-stopped
    environment:
      PGWEB_DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-rag_config}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8081:8081"
    networks: [rag]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  rag_repos:    # M3 : clones git du sync worker (/var/lib/rag/repos)

networks:
  rag:
    driver: bridge
