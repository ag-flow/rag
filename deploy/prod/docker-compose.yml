services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rag]

  backend:
    image: ghcr.io/ag-flow/rag-backend:${IMAGE_TAG:-latest}
    container_name: rag-backend
    restart: always
    env_file: .env
    environment:
      ENVIRONMENT: prod
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rag_repos:/var/lib/rag/repos
      - ./pricing.yml:/app/config/pricing.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [rag]

  frontend:
    image: ghcr.io/ag-flow/rag-frontend:${IMAGE_TAG:-latest}
    container_name: rag-frontend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [rag]

  caddy:
    image: caddy:2-alpine
    container_name: rag-caddy
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks: [rag]

volumes:
  postgres_data:
  rag_repos:
  caddy_data:
  caddy_config:

networks:
  rag:
    driver: bridge
